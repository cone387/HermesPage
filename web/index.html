<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HermesPage</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1 class="logo">HermesPage</h1>
        </div>
        <div class="header-right">
            <input type="text" id="search" class="search-input" placeholder="搜索报告...">
            <div id="user-menu" class="user-menu" style="display:none">
                <button class="user-menu-trigger" id="user-menu-trigger"></button>
                <div class="user-dropdown" id="user-dropdown">
                    <a href="/settings.html" class="dropdown-item">设置</a>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item dropdown-item-danger" id="logout-btn">退出登录</button>
                </div>
            </div>
            <span id="user-info" class="user-info"></span>
        </div>
    </header>
    <nav id="filters" class="filters">
        <div class="filter-row">
            <span class="filter-label">分类：</span>
            <div id="category-buttons" class="filter-buttons">
                <button class="cat-btn active" data-cat="">全部</button>
            </div>
        </div>
        <div class="filter-row">
            <span class="filter-label">标签：</span>
            <div id="tag-buttons" class="filter-buttons">
                <button class="tag-btn active" data-tag="">全部</button>
            </div>
        </div>
        <div class="filter-row" id="owner-filter-row" style="display:none">
            <span class="filter-label">用户：</span>
            <div id="owner-buttons" class="filter-buttons">
                <button class="cat-btn active" data-owner="">全部</button>
            </div>
        </div>
    </nav>
    <main id="content" class="content">
        <div class="loading">加载中...</div>
    </main>
    <div id="empty" class="empty" style="display:none">
        <div class="empty-icon">📋</div>
        <p>暂无报告</p>
    </div>
    <script src="/app.js"></script>
</body>
</html>
