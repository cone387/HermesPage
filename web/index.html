<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HermesPage</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1 class="logo">HermesPage</h1>
        </div>
        <div class="header-right">
            <input type="text" id="search" class="search-input" placeholder="搜索报告...">
            <button id="upload-btn" class="header-btn" style="display:none" title="上传报告">+</button>
            <button id="theme-toggle" class="header-btn" title="切换主题">◐</button>
            <div id="user-menu" class="user-menu" style="display:none">
                <button class="user-menu-trigger" id="user-menu-trigger"></button>
                <div class="user-dropdown" id="user-dropdown">
                    <a href="/settings.html" class="dropdown-item">设置</a>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item dropdown-item-danger" id="logout-btn">退出登录</button>
                </div>
            </div>
            <span id="user-info" class="user-info"></span>
        </div>
    </header>
    <nav id="filters" class="filters">
        <div class="filter-row">
            <span class="filter-label">分类：</span>
            <div id="category-buttons" class="filter-buttons">
                <button class="cat-btn active" data-cat="">全部</button>
            </div>
            <select id="sort-select" class="sort-select">
                <option value="time-desc">最新优先</option>
                <option value="time-asc">最早优先</option>
                <option value="title-asc">标题 A-Z</option>
                <option value="title-desc">标题 Z-A</option>
                <option value="size-desc">最大优先</option>
                <option value="size-asc">最小优先</option>
            </select>
        </div>
        <div class="filter-row">
            <span class="filter-label">标签：</span>
            <div id="tag-buttons" class="filter-buttons">
                <button class="tag-btn active" data-tag="">全部</button>
            </div>
        </div>
        <div class="filter-row" id="owner-filter-row" style="display:none">
            <span class="filter-label">用户：</span>
            <div id="owner-buttons" class="filter-buttons">
                <button class="cat-btn active" data-owner="">全部</button>
            </div>
        </div>
    </nav>
    <main id="content" class="content">
        <div class="loading">加载中...</div>
    </main>
    <div id="empty" class="empty" style="display:none">
        <div class="empty-icon">📋</div>
        <p>暂无报告</p>
    </div>

    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>上传报告</h3>
                <button class="modal-close">×</button>
            </div>
            <form id="upload-form">
                <div id="drop-zone" class="drop-zone">
                    <span class="drop-text">拖拽 HTML 文件到此处，或点击选择</span>
                    <input type="file" id="file-input" accept=".html,.htm" style="display:none">
                </div>
                <div class="upload-fields">
                    <input type="text" id="upload-title" placeholder="标题（可选，自动提取）">
                    <input type="text" id="upload-category" placeholder="分类（如 daily, analysis）">
                    <input type="text" id="upload-tags" placeholder="标签（逗号分隔）">
                    <select id="upload-visibility">
                        <option value="private">私有</option>
                        <option value="public">公开</option>
                    </select>
                </div>
                <button type="submit" class="upload-submit">上传</button>
            </form>
        </div>
    </div>

    <div id="confirm-modal" class="modal">
        <div class="modal-content modal-confirm">
            <p id="confirm-msg"></p>
            <div class="confirm-actions">
                <button class="confirm-cancel" id="confirm-cancel">取消</button>
                <button class="confirm-ok" id="confirm-ok">删除</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
